services:
  app:
    build: .
    container_name: serena_hotel_app
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/serena_hotel_db
      - JWT_SECRET=serena_hotel_jwt_secret_2024
      - NODE_ENV=development
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    container_name: serena_hotel_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
